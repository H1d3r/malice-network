project_name: malice
version: 2

git:
  ignore_tags:
    - nightly

before:
  hooks:
    - go mod tidy
    - go run scripts/pre_install.go --professional

builds:
  -
    main: ./client
    id: client
    binary: "iom_{{ .Os }}_{{ .Arch }}"
    flags:
      - -trimpath
      - "-tags=professional"
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags: |
      -s -w
      -X github.com/chainreactors/malice-network/server/rpc.ver={{ envOrDefault "VERSION" "" }}
      -X github.com/chainreactors/malice-network/server/rpc.commit={{ envOrDefault "COMMIT" "" }}.{{ envOrDefault "LICENSE_ID" "" }}
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
  -
    main: ./server/
    id: server
    binary: "malice_network_{{ .Os }}_{{ .Arch }}"
    flags:
      - -trimpath
      - "-tags=professional,dns,graph"
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags: |
      -s -w
      -X github.com/chainreactors/malice-network/helper/consts.Ver={{ envOrDefault "VERSION" "" }}
      -X github.com/chainreactors/malice-network/helper/consts.Commit={{ envOrDefault "COMMIT" "" }}.{{ envOrDefault "LICENSE_ID" "" }}
      -X github.com/chainreactors/malice-network/helper/consts.Buildstamp={{.Timestamp}}
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
upx:
  -
    enabled: true
    goos: [linux, windows]
    goarch:
      - amd64
      - "386"

archives:
  -
    name_template: "{{ .Binary }}"
    formats: [binary]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: desc
  filters:
    exclude:
      - '^MERGE'
      - "{{ .Tag }}"
      - "^docs"
release:
  github:
    owner: chainreactors
    name: malice-network
  draft: true
