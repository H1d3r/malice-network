name: update-search-index

# Triggered when mal-intl (community plugins) updates, or manually.
# Regenerates TF-IDF search vectors from docs + Lua sources and commits
# the updated search_index.bin. No LLM API required.
#
# To also generate Chinese enrichment (optional), trigger manually with
# the api-key and base-url inputs filled in.

on:
  # Auto-trigger when the community submodule is updated
  push:
    branches: [dev]
    paths:
      - "helper/intl/community/**"
      - "docs/reference/commands/**"

  # Manual trigger with optional LLM enrichment
  workflow_dispatch:
    inputs:
      api-key:
        description: "LLM API key for Chinese enrichment (optional)"
        required: false
        type: string
      base-url:
        description: "LLM API base URL (optional)"
        required: false
        default: "https://api.chainreactors.cn"
        type: string
      model:
        description: "LLM model name (optional)"
        required: false
        default: "gpt-5.4-mini"
        type: string

  # Can be called from mal-intl repo via repository_dispatch
  repository_dispatch:
    types: [mal-community-updated]

jobs:
  update-vectors:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: false

      - name: Update community submodule to latest
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --remote helper/intl/community/community

      - name: Generate reference docs
        run: |
          go run ./scripts/pre_install.go || true
          go run ./client/cmd/genhelp/ || true

      - name: Clone mal-community
        run: git clone --depth 1 https://github.com/chainreactors/mal-community.git /tmp/mal-community

      - name: Build genembeddings
        run: go build -o /tmp/genembeddings ./client/cmd/genembeddings/

      - name: Generate search vectors (TF-IDF)
        run: |
          ARGS="--docs docs/reference/commands"
          ARGS="$ARGS --lua helper/intl/community/community/modules"
          ARGS="$ARGS --mal-community /tmp/mal-community"
          ARGS="$ARGS --output client/core/search_index.bin"

          # Add LLM enrichment if API key provided
          if [ -n "${{ inputs.api-key }}" ]; then
            ARGS="$ARGS --api-key ${{ inputs.api-key }} --base-url ${{ inputs.base-url }} --model ${{ inputs.model }}"
          fi

          /tmp/genembeddings $ARGS

      - name: Verify index
        run: |
          python3 -c "
          import struct, sys
          with open('client/core/search_index.bin', 'rb') as f:
              magic = f.read(4)
              if magic != b'SRCH':
                  print('ERROR: invalid magic', file=sys.stderr); sys.exit(1)
              ver, ncmds, nvocab = struct.unpack('<III', f.read(12))
              if ncmds < 100:
                  print(f'ERROR: only {ncmds} commands, expected 100+', file=sys.stderr); sys.exit(1)
              print(f'OK: {ncmds} commands, {nvocab} vocab terms, version {ver}')
          "

      - name: Build verification
        run: go build ./client/core/
        env:
          CGO_ENABLED: 0

      - name: Commit updated vectors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/core/search_index.bin
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(search): update search index from community plugins

          Auto-generated by update-search-index workflow.
          $(python3 -c "import struct; f=open('client/core/search_index.bin','rb'); f.read(4); v,n,voc=struct.unpack('<III',f.read(12)); print(f'Commands: {n}, Vocab: {voc}')")
          "
          git push
